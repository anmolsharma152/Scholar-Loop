name: daily-email

on:
  schedule:
    - cron: '13 3 * * *'   # 03:13 UTC = 08:43 IST — off-peak, avoids queue
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Send learn + quiz
        run: python agent/send_daily.py
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Commit metadata updates
        run: |
          git config user.name "scholar-loop-bot"
          git config user.email "bot@scholar-loop.local"
          git add data/user.db
          if git diff --cached --quiet; then echo "no changes"; else git commit -m "chore: update review metadata [skip ci]" && git push; fi
