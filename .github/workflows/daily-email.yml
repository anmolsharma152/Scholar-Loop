name: daily-email

on:
  schedule:
    - cron: '30 1 * * *'   # 01:30 UTC = 07:00 IST
    - cron: '30 10 * * *'  # 10:30 UTC = 16:00 IST
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send daily email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agent/send_daily.py

      - name: Commit metadata updates
        run: |
          git config user.name "scholar-loop-bot"
          git config user.email "bot@scholar-loop.local"
          git add knowledge/
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: update review metadata [skip ci]"
            git push
          fi
